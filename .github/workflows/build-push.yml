name: Build and Push to Aliyun ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-33qulxhgw5nadzni.cn-beijing.personal.cr.aliyuncs.com
          username: Kkwans
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            crpi-33qulxhgw5nadzni.cn-beijing.personal.cr.aliyuncs.com/dh4300plus/nas-file-manager:latest
            crpi-33qulxhgw5nadzni.cn-beijing.personal.cr.aliyuncs.com/dh4300plus/nas-file-manager:${{ github.sha }}
